<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Penjualan Barang</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 20px;
        }

        .container {
            max-width: 700px;
            background: white;
            padding: 20px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        label {
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button {
            background-color: green;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: darkgreen;
        }

        .hasil {
            margin-top: 20px;
            background: #e8f5e9;
            padding: 15px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Sistem Penjualan Barang</h1>

    <label>Nama Barang</label>
    <input type="text" id="namaBarang">

    <label>Harga Barang (Rp)</label>
    <input type="number" id="harga">

    <label>Jumlah Beli</label>
    <input type="number" id="jumlah">

    <button onclick="hitungTotal()">Hitung Total</button>

    <div class="hasil" id="hasil">
        Hasil transaksi akan muncul di sini.
    </div>
</div>

<script>
    function hitungTotal() {
        let nama = document.getElementById("namaBarang").value;
        let harga = parseInt(document.getElementById("harga").value);
        let jumlah = parseInt(document.getElementById("jumlah").value);

        let total = harga * jumlah;

        document.getElementById("hasil").innerHTML =
            "<h3>Detail Penjualan</h3>" +
            "<p>Nama Barang : " + nama + "</p>" +
            "<p>Harga Barang : Rp " + harga.toLocaleString() + "</p>" +
            "<p>Jumlah Beli : " + jumlah + "</p>" +
            "<p><b>Total Bayar : Rp " + total.toLocaleString() + "</b></p>";
    }
</script>

</body>
</html>
